# Sets variables for package/commit versions
parameters:
  - name: buildEnvironment
    type: string
    default: PullRequest
    values:
      - PullRequest
      - Continuous
  - name: isReleaseBuild
    type: string
    default: 'False'

steps:
  - script: node ./.ado/scripts/setVersionEnvVars.js ${{ parameters.buildEnvironment }} $(Build.BuildId) ${{ parameters.isReleaseBuild }}
    displayName: Set version variables
    name: setVersionEnvVars
    env:
      RUNNER_TEMP: $(Build.StagingDirectory)
