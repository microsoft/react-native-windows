# Steps to setup an environment that can build native code

parameters:
  - name: platform
    type: string
    # Publish still using runtime matrix
    #values:
    #  - x86
    #  - x64
    #  - ARM64
    #  - ARM64EC
  - name: configuration
    type: string
    # Publish still using runtime matrix
    #values:
    #  - Debug
    #  - Release
  - name: buildEnvironment
    type: string
    # Publish still using runtime matrix
    #values:
    #  - PullRequest
    #  - Continuous
    #  - Publish
  - name: localDumpsExeNames
    type: object
    default: []
    # List of executable base names (without .exe) to register with WER LocalDumps,
    # so that crashes in those processes write a dump to $(CrashDumpRootPath).
    # Required for packaged/UWP apps where ProcDump-as-AeDebug is not reliably
    # invoked. Example: ['RNTesterApp-Fabric', 'Playground'].

steps:
  # The commit tag in the nuspec requires that we use at least nuget 5.8 (because things break with nuget versions before and Vs 16.8 or later)
  - task: NuGetToolInstaller@1
    displayName: Set NuGet version
    inputs:
      versionSpec: ">=5.8.0"

  - template: set-appx-platforms.yml
    parameters:
      platform: ${{ parameters.platform }}
      configuration: ${{ parameters.configuration }}
      buildEnvironment: ${{ parameters.buildEnvironment }}

  - pwsh: |
        & reg query "HKEY_LOCAL_MACHINE\SOFTWARE\Microsoft\Windows\Windows Error Reporting" /s
        & reg query "HKEY_CURRENT_USER\SOFTWARE\Microsoft\Windows\Windows Error Reporting" /s
        & reg query "HKEY_LOCAL_MACHINE\SOFTWARE\Microsoft\Windows NT\CurrentVersion\AeDebug" /s
        Enable-WindowsErrorReporting
    displayName: Check and enable Windows Error Reporting

  - pwsh: |
        $path = '$(Build.StagingDirectory)\CrashDumps'
        Write-Host "##vso[task.setvariable variable=CrashDumpRootPath]$path"
        New-Item -Path $path -ItemType Directory -Force | Out-Null
        # Grant full control to NT AUTHORITY\SYSTEM and Users so the WER service
        # (running as LocalSystem) and any child process — including packaged
        # apps — can write dumps here. Without this, per-exe LocalDumps can
        # silently fail on agents that lock down the work directory.
        & icacls $path /grant 'SYSTEM:(OI)(CI)F' 'Users:(OI)(CI)F' /T /C | Out-Null
        & icacls $path
    displayName: Set CrashDumpRootPath

  - pwsh: |
        Write-Host "##vso[task.setvariable variable=MSBUILDDEBUGPATH]$(CrashDumpRootPath)"
    displayName: Set MSBUILDDEBUGPATH

  - pwsh: |
        Write-Host "##vso[task.setvariable variable=ProcDumpPath]$(Build.StagingDirectory)\Procdump"
    displayName: Set ProcDumpPath

  - pwsh: |
      & $(Build.SourcesDirectory)\.ado\scripts\RunProcDump.ps1 -ProcDumpArgs @("-mm", "-i", "$(CrashDumpRootPath)") -ProcDumpInstallPath "$(ProcDumpPath)" -Verbose
    displayName: Setup ProcDump as AeDebug

  # Register WER LocalDumps for any executables the caller cares about.
  # This catches crashes in packaged/UWP apps (e.g. RNTesterApp-Fabric) that
  # the AeDebug-based ProcDump path does not reliably intercept. Dumps land
  # in $(CrashDumpRootPath), which is already wired to the crash-dump artifact
  # publisher in upload-build-logs.yml.
  - ${{ each exeName in parameters.localDumpsExeNames }}:
    - script: |
        call "$(Build.SourcesDirectory)\.ado\scripts\SetupLocalDumps.cmd" "${{ exeName }}" "$(CrashDumpRootPath)"
      displayName: Register WER LocalDumps for ${{ exeName }}.exe
