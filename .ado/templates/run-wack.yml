parameters:
  - name: packageName
    type: string
  - name: reportArtifact
    type: string

steps:
  - pwsh: .ado/scripts/TestWACK.ps1 -PackageName ${{ parameters.packageName }} -OutputDir $(Build.StagingDirectory)\WACK
    displayName: Run WACK

  - task: PublishBuildArtifacts@1
    displayName: Upload WACK report
    condition: succeededOrFailed()
    inputs:
      pathtoPublish: $(Build.StagingDirectory)\WACK
      artifactName: ${{ parameters.reportArtifact }}
