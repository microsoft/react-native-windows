parameters:
- name: workingDirectory
  type: string
  default: .
- name: agentImage
  type: string
  default: ManagedImage
  values:
      - ManagedImage
      - HostedImage

steps:
  - script: npx --yes midgard-yarn@1.23.34 --ignore-scripts --frozen-lockfile --cwd ${{ parameters.workingDirectory }}
    displayName: midgard-yarn (faster yarn install)
