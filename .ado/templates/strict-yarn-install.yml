parameters:
- name: workspace
  type: string
  default: react-native-windows-repo

steps:
  # Remove postinstall to avoid running build during install
  - pwsh: |
      $packageJson = Get-Content ./package.json | ConvertFrom-Json
      $packageJson.scripts = $packageJson.scripts | Select-Object * -ExcludeProperty postinstall
      $packageJson | ConvertTo-Json | Out-File ./package.json
    displayName: Remove postinstall

  - pwsh: |
      $env:YARN_PATH = (Get-Command yarn -ErrorAction SilentlyContinue).Path
      Write-Host "Yarn path: [$env:YARN_PATH]"

      Write-Host "PATH:"
      $env:PATH -split [System.IO.Path]::PathSeparator

  # TODO: REMOVE. Should be included in image.
  # Install yarn globally
  - task: CmdLine@2
    inputs:
      script: |
        npm install --global yarn
    displayName: Install yarn globally

  - pwsh: |
      $env:YARN_PATH = (Get-Command yarn -ErrorAction SilentlyContinue).Path
      Write-Host "Yarn path: [$env:YARN_PATH]"

      Write-Host "PATH:"
      $env:PATH -split [System.IO.Path]::PathSeparator

  - script: yarn install --immutable
    displayName: Strict yarn install ${{ parameters.workspace }}
    retryCountOnTaskFailure: 2
