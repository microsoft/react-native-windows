# Experimental pipeline to test GitHub access via stock 1ES template
# Mirrors the publish pipeline structure but performs only git operations
# using the OAuth creds supplied by the GitHub service connection (no PATs).

name: 0.0.$(Date:yyMM.d)$(Rev:rrr)

trigger: none
pr: none

resources:
  repositories:
    - repository: 1ESPipelineTemplates
      type: git
      name: 1ESPipelineTemplates/1ESPipelineTemplates
      ref: refs/tags/release

extends:
  template: v1/1ES.Official.PipelineTemplate.yml@1ESPipelineTemplates
  parameters:
    pool:
      name: Azure-Pipelines-1ESPT-ExDShared
    customBuildTags: []
    sdl:
      credscan:
        enabled: false
      binskim:
        enabled: false
      spotBugs:
        enabled: false
    stages:
      - stage: FakePublish
        displayName: GitHub OAuth Capability Probe
        jobs:
          - job: FakeGitProbe
            displayName: Test branch push and PR creation
            pool:
              name: Azure-Pipelines-1ESPT-ExDShared
            steps:
              - checkout: self
                persistCredentials: true

              - script: |
                  echo Repository: $(Build.Repository.Name)
                  echo Source branch: $(Build.SourceBranch)
                  git --version
                  gh --version
                displayName: Show repo info

              - script: git status -sb
                displayName: Show working tree status

              - script: |
                  git config user.name "React-Native-Windows Bot"
                  git config user.email "53619745+rnbot@users.noreply.github.com"
                displayName: Configure Git Identity

              - pwsh: |
                  $branch = "probe/prepare-release-test-$(Build.BuildId)"
                  Write-Host "Creating branch $branch"
                  git checkout -b $branch
                  Set-Content -Path release-probe.txt -Value "release probe $(Build.BuildId)"
                  git add release-probe.txt
                  git status -sb
                  git commit -m "chore: release probe (***NO_CI***)"
                  git push origin HEAD
                  Write-Host "Branch $branch pushed."
                displayName: Create, commit, and push branch

              - script: git config --list --show-origin | findstr /I extraheader
                displayName: Inspect git extraheader entries

              - pwsh: |
                  $headerLine = git config --get-regexp "http.*\.extraheader" 2>$null | Select-Object -First 1
                  if (-not $headerLine) {
                    Write-Host "No HTTP extraheader found; skipping PR creation."
                    Write-Host "##vso[task.setvariable variable=CanCreatePr]false"
                    return
                  }
                  $parts = $headerLine -split '\s+', 2
                  $headerValue = $parts[1]
                  $base64 = ($headerValue -split '\s+')[-1]
                  $decoded = [System.Text.Encoding]::UTF8.GetString([System.Convert]::FromBase64String($base64))
                  $token = $decoded.TrimStart(':')
                  Write-Host "Extracted OAuth token (length=$($token.Length))"
                  Write-Host "##vso[task.setvariable variable=GitHubOAuthToken;issecret=true]$token"
                  Write-Host "##vso[task.setvariable variable=CanCreatePr]true"
                displayName: Extract GitHub OAuth token

              # Test: gh CLI with extracted token
              - script: |
                  gh pr create --head probe/prepare-release-test-$(Build.BuildId) --base main --title "Probe PR $(Build.BuildId)" --body "Automation probe - will be closed immediately." --draft --repo microsoft/react-native-windows
                displayName: "Test: Create draft PR via gh CLI"
                condition: and(succeeded(), eq(variables['CanCreatePr'], 'true'))
                env:
                  GH_TOKEN: $(GitHubOAuthToken)
                continueOnError: true

              # Fallback: REST API with extracted token
              - pwsh: |
                  $token = '$(GitHubOAuthToken)'
                  if (-not $token) { throw "GitHub token not available." }
                  $body = [ordered]@{
                    title = "Probe PR $(Build.BuildId)"
                    head  = "probe/prepare-release-test-$(Build.BuildId)"
                    base  = "main"
                    body  = "Automation probe to validate OAuth permissions."
                    draft = $true
                  } | ConvertTo-Json
                  $headers = @{
                    Authorization = "Bearer $token"
                    Accept        = "application/vnd.github+json"
                    "User-Agent"  = "rnw-prepare-release-bot"
                    "X-GitHub-Api-Version" = "2022-11-28"
                  }
                  $resp = Invoke-RestMethod -Method Post -Uri "https://api.github.com/repos/microsoft/react-native-windows/pulls" -Headers $headers -Body $body -ContentType 'application/json'
                  Write-Host "Created draft PR #$($resp.number): $($resp.html_url)"
                  Write-Host "##vso[task.setvariable variable=ProbePrNumber]$($resp.number)"
                displayName: "Fallback: Create draft PR via REST API"
                condition: and(succeeded(), eq(variables['CanCreatePr'], 'true'))

              - pwsh: |
                  $token = '$(GitHubOAuthToken)'
                  $pr = '$(ProbePrNumber)'
                  if ($pr) {
                    $headers = @{
                      Authorization = "Bearer $token"
                      Accept        = "application/vnd.github+json"
                      "User-Agent"  = "rnw-prepare-release-bot"
                      "X-GitHub-Api-Version" = "2022-11-28"
                    }
                    Invoke-RestMethod -Method Patch -Uri "https://api.github.com/repos/microsoft/react-native-windows/pulls/$pr" -Headers $headers -Body '{"state":"closed"}' -ContentType 'application/json' | Out-Null
                    Write-Host "Closed draft PR #$pr"
                  } else {
                    Write-Host "No PR number recorded; skipping close."
                  }
                displayName: Close draft PR
                condition: and(succeeded(), eq(variables['CanCreatePr'], 'true'), ne(variables['ProbePrNumber'], ''))

              - script: git push origin --delete probe/prepare-release-test-$(Build.BuildId)
                displayName: "Cleanup: Delete probe branch"
                condition: always()
