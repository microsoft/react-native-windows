#
# The Publish pipeline entry point.
# This file is a copy of ci-pipeline.yml kept for backward compatibility
# with *-stable branches that haven't been updated yet.
# Once all branches use ci-pipeline.yml, this file can be deleted.
#

name: 0.0.$(Date:yyMM.d)$(Rev:rrr)

trigger: none
pr: none

parameters:
  - name: isReleaseBuild
    displayName: 'Treat as Release build (skip beachball, use committed versions)'
    type: string
    default: auto
    values:
      - auto
      - 'true'
      - 'false'

variables:
  - template: variables/windows.yml
  - group: RNW Secrets

extends:
  template: build-template.yml@self
  parameters:
    buildEnvironment: Continuous
    isReleaseBuild: ${{ parameters.isReleaseBuild }}
