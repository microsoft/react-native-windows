name: 0.0.$(Date:yyMM.d)$(Rev:rrr)

parameters:
- name: AgentPool
  type: object
  default:
    Medium:
      name: rnw-pool-4-microsoft
      demands: ImageOverride -equals rnw-img-vs2022-node22
    Large:
      name: rnw-pool-8-microsoft
      demands: ImageOverride -equals rnw-img-vs2022-node22

- name: desktopBuildMatrix
  type: object
  default:
    - Name: X64Debug
      BuildConfiguration: Debug
      BuildPlatform: x64
      UseFabric: false
    - Name: X64Release
      BuildConfiguration: Release
      BuildPlatform: x64
      UseFabric: false
    - Name: X86Debug
      BuildConfiguration: Debug
      BuildPlatform: x86
      UseFabric: false
    - Name: X86Release
      BuildConfiguration: Release
      BuildPlatform: x86
      UseFabric: false
    - Name: ARM64ECDebug
      BuildConfiguration: Debug
      BuildPlatform: ARM64EC
      UseFabric: false
    - Name: ARM64ECRelease
      BuildConfiguration: Release
      BuildPlatform: ARM64EC
      UseFabric: false
    - Name: X64DebugFabric
      BuildConfiguration: Debug
      BuildPlatform: x64
      UseFabric: true
    - Name: X64ReleaseFabric
      BuildConfiguration: Release
      BuildPlatform: x64
      UseFabric: true
    - Name: X86DebugFabric
      BuildConfiguration: Debug
      BuildPlatform: x86
      UseFabric: true
    - Name: X86ReleaseFabric
      BuildConfiguration: Release
      BuildPlatform: x86
      UseFabric: true
    - Name: ARM64ECDebugFabric
      BuildConfiguration: Debug
      BuildPlatform: ARM64EC
      UseFabric: true
    - Name: ARM64ECReleaseFabric
      BuildConfiguration: Release
      BuildPlatform: ARM64EC
      UseFabric: true

- name: universalBuildMatrix
  type: object
  default:
    - Name: X64Release
      BuildConfiguration: Release
      BuildPlatform: x64
      UseFabric: false
    - Name: X86Release
      BuildConfiguration: Release
      BuildPlatform: x86
      UseFabric: false
    - Name: Arm64Release
      BuildConfiguration: Release
      BuildPlatform: ARM64
      UseFabric: false
    - Name: X64Debug
      BuildConfiguration: Debug
      BuildPlatform: x64
      UseFabric: false
    - Name: X86Debug
      BuildConfiguration: Debug
      BuildPlatform: x86
      UseFabric: false
    - Name: Arm64Debug
      BuildConfiguration: Debug
      BuildPlatform: ARM64
      UseFabric: false
    - Name: X64ReleaseFabric
      BuildConfiguration: Release
      BuildPlatform: x64
      UseFabric: true
    - Name: X86ReleaseFabric
      BuildConfiguration: Release
      BuildPlatform: x86
      UseFabric: true
    - Name: Arm64ReleaseFabric
      BuildConfiguration: Release
      BuildPlatform: ARM64
      UseFabric: true
    - Name: X64DebugFabric
      BuildConfiguration: Debug
      BuildPlatform: x64
      UseFabric: true
    - Name: X86DebugFabric
      BuildConfiguration: Debug
      BuildPlatform: x86
      UseFabric: true
    - Name: Arm64DebugFabric
      BuildConfiguration: Debug
      BuildPlatform: ARM64
      UseFabric: true

variables:
  - template: variables/windows.yml
  - group: RNW Secrets

trigger: none
pr: none

resources:
  repositories:
  - repository: 1ESPipelineTemplates
    type: git
    name: 1ESPipelineTemplates/1ESPipelineTemplates
    ref: refs/tags/release
extends:
  template: v1/1ES.Official.PipelineTemplate.yml@1ESPipelineTemplates
  parameters:
    pool: ${{ parameters.AgentPool.Medium }}
    featureFlags:
      autoEnablePREfastWithNewRuleset: false # PREfast produces 0 actionable findings; auto-enable injects /analyze into every C++ TU, generating ~2656 SARIF files that Guardian uploads for ~19 min per native build
    sdl:
      credscan:
          suppressionsFile: $(Build.SourcesDirectory)\.ado\config\CredScanSuppressions.json
      spotBugs:
          enabled: false # We don't have any java, but random packages in node_modules do
      prefast:
          enabled: false
    stages:
    - stage: RNWPublish
      jobs:
        # Set version variables
        - job: SetVersionVars
          displayName: Set Version Variables
          pool: ${{ parameters.AgentPool.Medium }}
          timeoutInMinutes: 15
          steps:
          - template: .ado/templates/checkout-shallow.yml@self

          - template: .ado/templates/set-version-vars.yml@self
            parameters:
              buildEnvironment: Continuous

          # We new npmPack.js in Release pipeline to detect already published NPM packages and avoid publishing them again
          - script: copy ".ado\scripts\npmPack.js" "$(Build.StagingDirectory)\versionEnvVars\npmPack.js"
            displayName: Include npmPack.js in VersionEnvVars artifact

          templateContext:
            outputs:
              - output: pipelineArtifact
                displayName: 'Publish version variables'
                targetPath: $(Build.StagingDirectory)/versionEnvVars
                artifactName: VersionEnvVars

        # Create NPM packages
        - job: RnwNpmPack
          displayName: Create NPM packages
          pool: ${{ parameters.AgentPool.Medium }}
          timeoutInMinutes: 60
          cancelTimeoutInMinutes: 5
          steps:
          - template: .ado/templates/checkout-shallow.yml@self

          - template: .ado/templates/prepare-js-env.yml@self
            parameters:
              agentImage: HostedImage

          - script: node .ado/scripts/npmPack.js --clean --no-color "$(Pipeline.Workspace)\published-packages"
            displayName: Pack npm packages

          - script: dir /s "$(Pipeline.Workspace)\published-packages"
            displayName: Show created npm packages

          templateContext:
            outputs:
              - output: pipelineArtifact
                displayName: 'Publish npm pack artifacts'
                condition: succeededOrFailed()
                targetPath: $(Pipeline.Workspace)/published-packages
                artifactName: NpmPackedTarballs

        # Run linting
        - template: .ado/jobs/linting.yml@self
          parameters:
            buildEnvironment: Continuous
            AgentPool: ${{ parameters.AgentPool }}

        # Create and sign Destop DLLs
        - ${{ each matrix in parameters.desktopBuildMatrix }}:
          - job: RnwNativeBuildDesktop${{ matrix.Name }}
            displayName: Build Desktop ${{ matrix.Name }}
            dependsOn: SetVersionVars
            pool: ${{ parameters.AgentPool.Large }}
            timeoutInMinutes: 360 # CodeQL requires 3x usual build timeout
            steps:
            - template: .ado/templates/checkout-shallow.yml@self

            - template: .ado/templates/prepare-js-env.yml@self

            - template: .ado/templates/prepare-build-env.yml@self
              parameters:
                platform: ${{ matrix.BuildPlatform }}
                configuration: ${{ matrix.BuildConfiguration }}
                buildEnvironment: Publish

            - template: .ado/templates/apply-published-version-vars.yml@self

            - ${{ if eq(matrix.UseFabric, true) }}:
              - template: .ado/templates/enable-fabric-experimental-feature.yml@self

            - template: .ado/templates/msbuild-sln.yml@self
              parameters:
                solutionDir: vnext
                solutionName: ReactWindows-Desktop.sln
                buildPlatform: ${{ matrix.BuildPlatform }}
                buildConfiguration: ${{ matrix.BuildConfiguration }}
                oneESMode: true ## Files are only copied to staging, not published
                msbuildArguments: /p:ForceImportAfterCppTargets=$(Build.SourcesDirectory)\vnext\PropertySheets\CIBuildOptimizations.props

            - template: .ado/templates/publish-build-artifacts.yml@self
              parameters:
                oneESMode: true ## Files are only copied to staging, not published
                ${{ if eq(matrix.UseFabric, true) }}:
                  artifactName: DesktopFabric
                ${{ else }}:
                  artifactName: Desktop
                buildPlatform: ${{ matrix.BuildPlatform }}
                buildConfiguration: ${{ matrix.BuildConfiguration }}
                contents: |
                  React.Windows.Desktop\**
                  React.Windows.Desktop.DLL\**
                  React.Windows.Desktop.Test.DLL\**

            - template: .ado/templates/esrp-codesign-binaries.yml@self
              parameters:
                displayName: 'CodeSign Desktop Binaries'
                ${{ if eq(matrix.UseFabric, true) }}:
                  folderPath: $(Build.StagingDirectory)/NuGet/DesktopFabric/${{ matrix.BuildPlatform }}/${{ matrix.BuildConfiguration }}
                ${{ else }}:
                  folderPath: $(Build.StagingDirectory)/NuGet/Desktop/${{ matrix.BuildPlatform }}/${{ matrix.BuildConfiguration }}
                pattern: |
                  **/react-native-win32.dll

            templateContext:
              sdl:
                prefast:
                  enabled: false
                binskim:
                  analyzeTargetGlob: '$(Build.SourcesDirectory)\vnext\target\${{ matrix.BuildPlatform }}\${{ matrix.BuildConfiguration }}\React.Windows.Desktop.DLL\react-native-win32.dll'
              outputs:
              - output: pipelineArtifact
                displayName: 'Upload build logs'
                condition: succeededOrFailed()
                targetPath: $(BuildLogDirectory)
                artifactName: Build logs - $(Agent.JobName)-$(System.JobAttempt)
              - output: pipelineArtifact
                displayName: 'Upload crash dumps'
                condition: and(succeededOrFailed(), eq(variables.HasCrashDumps, 'True'))
                targetPath: '$(CrashDumpRootPath)'
                artifactName: Crash dumps - $(Agent.JobName)-$(System.JobAttempt)
              - output: pipelineArtifact
                ${{ if eq(matrix.UseFabric, true) }}:
                  displayName: 'Publish Artifact: DesktopFabric.${{matrix.buildPlatform}}.${{matrix.buildConfiguration}}'
                  artifactName: DesktopFabric.${{matrix.buildPlatform}}.${{matrix.buildConfiguration}}
                  targetPath: $(Build.StagingDirectory)/NuGet/DesktopFabric/${{matrix.buildPlatform}}/${{matrix.buildConfiguration}}
                ${{ else }}:
                  displayName: 'Publish Artifact: Desktop.${{matrix.buildPlatform}}.${{matrix.buildConfiguration}}'
                  artifactName: Desktop.${{matrix.buildPlatform}}.${{matrix.buildConfiguration}}
                  targetPath: $(Build.StagingDirectory)/NuGet/Desktop/${{matrix.buildPlatform}}/${{matrix.buildConfiguration}}

        # Create and sign Universal DLLs
        - ${{ each matrix in parameters.universalBuildMatrix }}:
          - job: RnwNativeBuildUniversal${{ matrix.Name }}
            displayName: Build Universal ${{ matrix.Name }}
            dependsOn: SetVersionVars
            pool: ${{ parameters.AgentPool.Large }}
            timeoutInMinutes: 360 # CodeQL requires 3x usual build timeout
            steps:
            - template: .ado/templates/checkout-shallow.yml@self

            - template: .ado/templates/prepare-js-env.yml@self

            - template: .ado/templates/prepare-build-env.yml@self
              parameters:
                platform: ${{ matrix.BuildPlatform }}
                configuration: ${{ matrix.BuildConfiguration }}
                buildEnvironment: Publish

            - template: .ado/templates/apply-published-version-vars.yml@self

            - ${{ if eq(matrix.UseFabric, true) }}:
              - template: .ado/templates/enable-fabric-experimental-feature.yml@self

            - template: .ado/templates/msbuild-sln.yml@self
              parameters:
                solutionDir: vnext
                ${{ if eq(matrix.UseFabric, true) }}:
                  solutionName: Microsoft.ReactNative.CppOnly.slnf
                ${{ else }}:
                  solutionName: Microsoft.ReactNative.sln
                buildPlatform: ${{ matrix.BuildPlatform }}
                buildConfiguration: ${{ matrix.BuildConfiguration }}
                oneESMode: true ## Files are only copied to staging, not published
                msbuildArguments: /p:ForceImportAfterCppTargets=$(Build.SourcesDirectory)\vnext\PropertySheets\CIBuildOptimizations.props

            - task: PowerShell@2
              displayName: Make AnyCPU Reference Assemblies
              inputs:
                filePath: vnext/Scripts/Tfs/Make-AnyCPU-RefAssemblies.ps1
                arguments: -TargetRoot $(Build.SourcesDirectory)\vnext\target -BuildRoot $(Build.SourcesDirectory)\vnext\target

            - template: .ado/templates/publish-build-artifacts.yml@self
              parameters:
                oneESMode: true ## Files are only copied to staging, not published
                ${{ if eq(matrix.UseFabric, true) }}:
                  artifactName: ReactWindowsFabric
                ${{ else }}:
                  artifactName: ReactWindows
                buildPlatform: ${{ matrix.BuildPlatform }}
                buildConfiguration: ${{ matrix.BuildConfiguration }}
                contents: |
                  Microsoft.ReactNative\**
                  Microsoft.ReactNative.Managed\**
                  Microsoft.ReactNative.Managed.CodeGen\**

            - template: .ado/templates/esrp-codesign-binaries.yml@self
              parameters:
                displayName: 'CodeSign Microsoft.ReactNative Binaries'
                ${{ if eq(matrix.UseFabric, true) }}:
                  folderPath: $(Build.StagingDirectory)/NuGet/ReactWindowsFabric/${{ matrix.BuildPlatform }}/${{ matrix.BuildConfiguration }}
                ${{ else }}:
                  folderPath: $(Build.StagingDirectory)/NuGet/ReactWindows/${{ matrix.BuildPlatform }}/${{ matrix.BuildConfiguration }}
                pattern: |
                  **/Microsoft.ReactNative.dll
                  **/Microsoft.ReactNative.winmd
                  **/Microsoft.ReactNative.Projection.dll

            templateContext:
              sdl:
                prefast:
                  enabled: false
                binskim:
                  analyzeTargetGlob: '$(Build.SourcesDirectory)\vnext\target\${{ matrix.BuildPlatform }}\${{ matrix.BuildConfiguration }}\Microsoft.ReactNative\Microsoft.ReactNative.dll'
              outputs:
              - output: pipelineArtifact
                displayName: 'Upload build logs'
                condition: succeededOrFailed()
                targetPath: $(BuildLogDirectory)
                artifactName: Build logs - $(Agent.JobName)-$(System.JobAttempt)
              - output: pipelineArtifact
                displayName: 'Upload crash dumps'
                condition: and(succeededOrFailed(), eq(variables.HasCrashDumps, 'True'))
                targetPath: '$(CrashDumpRootPath)'
                artifactName: Crash dumps - $(Agent.JobName)-$(System.JobAttempt)
              - output: pipelineArtifact
                ${{ if eq(matrix.UseFabric, true) }}:
                  displayName: 'Publish Artifact: ReactWindowsFabric.${{ matrix.BuildPlatform }}.${{ matrix.BuildConfiguration }}'
                  artifactName: ReactWindowsFabric.${{ matrix.BuildPlatform }}.${{ matrix.BuildConfiguration }}
                  targetPath: $(Build.StagingDirectory)/NuGet/ReactWindowsFabric/${{ matrix.BuildPlatform }}/${{ matrix.BuildConfiguration }}
                ${{ else }}:
                  displayName: 'Publish Artifact: ReactWindows.${{ matrix.BuildPlatform }}.${{ matrix.BuildConfiguration }}'
                  artifactName: ReactWindows.${{ matrix.BuildPlatform }}.${{ matrix.BuildConfiguration }}
                  targetPath: $(Build.StagingDirectory)/NuGet/ReactWindows/${{ matrix.BuildPlatform }}/${{ matrix.BuildConfiguration }}

        # Create Nuget packages
        - job: RNWNuget
          displayName: Pack NuGet
          dependsOn:
            - RnwNpmPack
            - Linting
            - ${{ each matrix in parameters.desktopBuildMatrix }}:
              - RnwNativeBuildDesktop${{ matrix.Name }}
            - ${{ each matrix in parameters.universalBuildMatrix }}:
              - RnwNativeBuildUniversal${{ matrix.Name }}
          pool: ${{ parameters.AgentPool.Medium }}
          timeoutInMinutes: 60 # Protect against the long CodeSign task

          steps:
          - template: .ado/templates/checkout-shallow.yml@self

          - template: .ado/templates/prepare-js-env.yml@self

          - template: .ado/templates/apply-published-version-vars.yml@self

          # The commit tag in the nuspec requires that we use at least nuget 5.8 (because things break with nuget versions before and VS 16.8 or later)
          - task: NuGetToolInstaller@1
            inputs:
              versionSpec: ">=5.8.0"

          - template: .ado/templates/prep-and-pack-nuget.yml@self
            parameters:
              artifactName: ReactWindows
              publishCommitId: $(publishCommitId)
              npmVersion: $(npmVersion)
              packMicrosoftReactNative: true
              packMicrosoftReactNativeCxx: true
              packMicrosoftReactNativeManaged: true
              packMicrosoftReactNativeManagedCodeGen: true
              slices:
                - platform: x64
                  configuration: Release
                - platform: x86
                  configuration: Release
                - platform: ARM64
                  configuration: Release
                - platform: x64
                  configuration: Debug
                - platform: x86
                  configuration: Debug
                - platform: ARM64
                  configuration: Debug

          - template: .ado/templates/prep-and-pack-nuget.yml@self
            parameters:
              artifactName: ReactWindowsFabric
              publishCommitId: $(publishCommitId)
              npmVersion: $(npmVersion)-Fabric
              packMicrosoftReactNative: true
              packMicrosoftReactNativeCxx: true
              # packMicrosoftReactNativeManaged: true
              # packMicrosoftReactNativeManagedCodeGen: true
              slices:
                - platform: x64
                  configuration: Release
                - platform: x86
                  configuration: Release
                - platform: ARM64
                  configuration: Release
                - platform: x64
                  configuration: Debug
                - platform: x86
                  configuration: Debug
                - platform: ARM64
                  configuration: Debug

          - template: .ado/templates/prep-and-pack-nuget.yml@self
            parameters:
              artifactName: Desktop
              publishCommitId: $(publishCommitId)
              npmVersion: $(npmVersion)
              packDesktop: true
              slices:
                - platform: x64
                  configuration: Release
                - platform: x86
                  configuration: Release
                - platform: ARM64EC
                  configuration: Release
                - platform: x64
                  configuration: Debug
                - platform: x86
                  configuration: Debug
                - platform: ARM64EC
                  configuration: Debug

          - template: .ado/templates/prep-and-pack-nuget.yml@self
            parameters:
              artifactName: DesktopFabric
              publishCommitId: $(publishCommitId)
              npmVersion: $(npmVersion)-Fabric
              packDesktop: true
              slices:
                - platform: x64
                  configuration: Release
                - platform: x86
                  configuration: Release
                - platform: ARM64EC
                  configuration: Release
                - platform: x64
                  configuration: Debug
                - platform: x86
                  configuration: Debug
                - platform: ARM64EC
                  configuration: Debug

          - template: .ado/templates/esrp-codesign-nuget.yml@self
            parameters:
              displayName: 'CodeSign all NuGet packages'
              folderPath: $(System.DefaultWorkingDirectory)/NugetRootFinal
              pattern: '**/*.nupkg'

          templateContext:
            sdl:
              binskim:
                analyzeTargetGlob: '$(System.DefaultWorkingDirectory)\NugetRoot\**\Microsoft.ReactNative\Microsoft.ReactNative.dll;$(System.DefaultWorkingDirectory)\NugetRoot\**\React.Windows.Desktop.DLL\react-native-win32.dll'
            outputs:
            - output: pipelineArtifact
              displayName: 'Publish final nuget artifacts'
              targetPath: $(System.DefaultWorkingDirectory)\NugetRootFinal
              artifactName: "ReactWindows-final-nuget"
