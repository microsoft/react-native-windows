#
parameters:
  - name: buildEnvironment
    type: string
    default : PullRequest
    values:
      - PullRequest
      - Continuous
  - name: AgentPool
    type: object
  - name: buildMatrix
    type: object
    default:
      - BuildEnvironment: PullRequest
        Matrix:
          - Name: X64Hermes
            BuildPlatform: x64
      - BuildEnvironment: Continuous
        Matrix:
          - Name: X64Hermes
            BuildPlatform: x64
          - Name: X86Hermes
            BuildPlatform: x86

jobs:
  - ${{ each config in parameters.buildMatrix }}:
    - ${{ if eq(config.BuildEnvironment, parameters.buildEnvironment) }}:
      - ${{ each matrix in config.Matrix }}:
        - job: E2ETestFabric${{ matrix.Name }}
          displayName: E2E Test App Fabric ${{ matrix.Name }}

          variables: [template: ../variables/windows.yml]
          pool: ${{ parameters.AgentPool.Medium }}
          timeoutInMinutes: 60 # how long to run the job before automatically cancelling
          cancelTimeoutInMinutes: 5 # how much time to give 'run always even if cancelled tasks' before killing them

          steps:
            - template: ../templates/checkout-shallow.yml

            - template: ../templates/prepare-js-env.yml

            - template: ../templates/prepare-build-env.yml
              parameters:
                platform: ${{ matrix.BuildPlatform }}
                configuration: Release
                buildEnvironment: ${{ config.buildEnvironment }}

            - pwsh: |
                Write-Host "##vso[task.setvariable variable=BuildLogDirectory]$(Build.BinariesDirectory)\${{ matrix.BuildPlatform }}\BuildLogs"
              displayName: Set BuildLogDirectory

            - task: PowerShell@2
              displayName: Start tracing
              inputs:
                targetType: filePath # filePath | inline
                filePath: $(Build.SourcesDirectory)\vnext\Scripts\Tracing\Start-Tracing.ps1
                pwsh: true

            - template: ../templates/run-windows-with-certificates.yml
              parameters:
                buildEnvironment: ${{ parameters.BuildEnvironment }}
                buildConfiguration: Release
                buildPlatform: ${{ matrix.BuildPlatform }}
                buildLogDirectory: $(BuildLogDirectory)
                workingDirectory: packages/e2e-test-app-fabric

            - script: |
                echo ##vso[task.setvariable variable=StartedFabricTests]true
              displayName: Set StartedFabricTests

            - script: |
                yarn e2etest
              displayName: yarn e2etest
              workingDirectory: packages/e2e-test-app-fabric
              timeoutInMinutes: 10 # Time to wait for this task to complete before the server kills it.

            - powershell: |
                if (Test-Path "packages/e2e-test-app-fabric/test/__image_snapshots__/__diff_output__") {
                  Write-Host "##vso[task.setvariable variable=DiffOutputExists]true"
                }
              displayName: Check for image diff output folder
              condition: failed()

            - task: CopyFiles@2
              displayName: Copy Fabric image diffs
              inputs:
                sourceFolder: packages/e2e-test-app-fabric/test/__image_snapshots__/__diff_output__
                targetFolder: $(Build.StagingDirectory)/snapshots-image-diffs
                contents: "**"
              condition: and(failed(), eq(variables.DiffOutputExists, 'true'))

            - script: npx jest --clearCache
              displayName: clear jest cache
              workingDirectory: packages/e2e-test-app-fabric
              condition: and(failed(), eq(variables.StartedFabricTests, 'true'))

            - script: yarn e2etest -u
              displayName: Update snapshots
              workingDirectory: packages/e2e-test-app-fabric
              condition: and(failed(), eq(variables.StartedFabricTests, 'true'))
              timeoutInMinutes: 10 # Time to wait for this task to complete before the server kills it.

            - task: PowerShell@2
              displayName: Stop tracing
              inputs:
                targetType: filePath # filePath | inline
                filePath: $(Build.SourcesDirectory)\vnext\Scripts\Tracing\Stop-Tracing.ps1
                arguments: -NoAnalysis -outputFolder $(Build.StagingDirectory)/Tracing
                pwsh: true
              condition: true

            # Publish tasks moved to templateContext.outputs (1ES compliance)
            - task: CopyFiles@2
              displayName: Copy Fabric snapshots
              inputs:
                sourceFolder: packages/e2e-test-app-fabric/test/__snapshots__
                targetFolder: $(Build.StagingDirectory)/snapshots-fabric
                contents: "**"
              condition: failed()

            - task: CopyFiles@2
              displayName: Copy Fabric image snapshots
              inputs:
                sourceFolder: packages/e2e-test-app-fabric/test/__image_snapshots__
                targetFolder: $(Build.StagingDirectory)/snapshots-image
                contents: "**"
              condition: failed()

            - task: CopyFiles@2
              displayName: Copy RNTesterApp artifacts
              inputs:
                sourceFolder: $(Build.SourcesDirectory)/packages/e2e-test-app-fabric/windows/${{ matrix.BuildPlatform }}/Release
                targetFolder: $(Build.StagingDirectory)/RNTesterApp-Fabric
                contents: "**"
              condition: failed()

            - template: ../templates/upload-build-logs.yml
              parameters:
                oneESMode: true
                buildLogDirectory: '$(BuildLogDirectory)'

          templateContext:
            outputs:
            - output: pipelineArtifact
              displayName: 'Upload traces'
              condition: true
              targetPath: $(Build.StagingDirectory)/Tracing
              artifactName: Traces - $(Agent.JobName)-$(System.JobAttempt)
            - output: pipelineArtifact
              displayName: 'Publish Artifact: RNTesterApp Fabric'
              condition: failed()
              targetPath: $(Build.StagingDirectory)/RNTesterApp-Fabric
              artifactName: RNTesterApp-Fabric-${{ matrix.Name }}-$(System.JobAttempt)
            - output: pipelineArtifact
              displayName: 'Publish Artifact: Fabric Snapshots'
              condition: failed()
              targetPath: $(Build.StagingDirectory)/snapshots-fabric
              artifactName: Snapshots - RNTesterApp-Fabric-${{ matrix.Name }}-$(System.JobAttempt)
            - output: pipelineArtifact
              displayName: 'Publish Artifact: Image Diffs'
              condition: failed()
              targetPath: $(Build.StagingDirectory)/snapshots-image-diffs
              artifactName: Snapshots - RNTesterApp-Image-Diffs-${{ matrix.Name }}-$(System.JobAttempt)
            - output: pipelineArtifact
              displayName: 'Publish Artifact: Image Snapshots'
              condition: failed()
              targetPath: $(Build.StagingDirectory)/snapshots-image
              artifactName: Snapshots - RNTesterApp-Image-${{ matrix.Name }}-$(System.JobAttempt)
            - output: pipelineArtifact
              displayName: 'Upload build logs'
              condition: succeededOrFailed()
              targetPath: $(BuildLogDirectory)
              artifactName: Build logs - $(Agent.JobName)-$(System.JobAttempt)
            - output: pipelineArtifact
              displayName: 'Upload crash dumps'
              condition: and(succeededOrFailed(), eq(variables.HasCrashDumps, 'True'))
              targetPath: '$(CrashDumpRootPath)'
              artifactName: Crash dumps - $(Agent.JobName)-$(System.JobAttempt)
