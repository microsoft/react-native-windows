parameters:
  - name: buildEnvironment
    type: string
    default: PullRequest
    values:
      - PullRequest
      - Continuous
  - name: AgentPool
    type: object
  - name: buildMatrix
    type: object
    default:
      - BuildEnvironment: PullRequest
        Matrix:
          - Name: FabricX64Release
            template: cpp-app
            configuration: Release
            platform: x64
            additionalRunArguments: --no-autolink
          - Name: FabricX86Debug
            template: cpp-app
            configuration: Debug
            platform: x86
            additionalRunArguments: --no-autolink
          - Name: FabricArm64Release
            template: cpp-app
            configuration: Release
            platform: ARM64
            additionalRunArguments: --no-autolink --no-deploy
          - Name: FabricLibX64Release
            template: cpp-lib
            configuration: Release
            platform: x64
            additionalRunArguments:
          - Name: FabricLibX86Debug
            template: cpp-lib
            configuration: Debug
            platform: x86
            additionalRunArguments:
          - Name: FabricLibArm64Release
            template: cpp-lib
            configuration: Release
            platform: ARM64
            additionalRunArguments: --no-deploy
      - BuildEnvironment: Continuous
        Matrix:
          - Name: FabricX64Debug
            template: cpp-app
            configuration: Debug
            platform: x64
            additionalRunArguments: --no-autolink
          - Name: FabricX64Release
            template: cpp-app
            configuration: Release
            platform: x64
            additionalRunArguments: --no-autolink
          - Name: FabricX86Debug
            template: cpp-app
            configuration: Debug
            platform: x86
            additionalRunArguments: --no-autolink
          - Name: FabricX86Release
            template: cpp-app
            configuration: Release
            platform: x86
          - Name: FabricArm64Debug
            template: cpp-app
            configuration: Debug
            platform: ARM64
            additionalRunArguments: --no-autolink --no-deploy
          - Name: FabricArm64Release
            template: cpp-app
            configuration: Release
            platform: ARM64
            additionalRunArguments: --no-autolink --no-deploy
          - Name: FabricLibX64Debug
            template: cpp-lib
            configuration: Debug
            platform: x64
            additionalRunArguments:
          - Name: FabricLibX64Release
            template: cpp-lib
            configuration: Release
            platform: x64
            additionalRunArguments:
          - Name: FabricLibX86Debug
            template: cpp-lib
            configuration: Debug
            platform: x86
            additionalRunArguments:
          - Name: FabricLibX86Release
            template: cpp-lib
            configuration: Release
            platform: x86
            additionalRunArguments:
          - Name: FabricLibArm64Debug
            template: cpp-lib
            configuration: Debug
            platform: ARM64
            additionalRunArguments: --no-deploy
          - Name: FabricLibArm64Release
            template: cpp-lib
            configuration: Release
            platform: ARM64
            additionalRunArguments: --no-deploy
jobs:
  - ${{ each config in parameters.buildMatrix }}:
    - ${{ if eq(config.BuildEnvironment, parameters.buildEnvironment) }}:
      - ${{ each matrix in config.Matrix }}:
        - job: CliInitWindows${{ matrix.Name }}
          displayName: Verify CliInitWindows ${{ matrix.Name }}

          # No job-level dependsOn needed — the CLI stage depends on the Build stage,
          # which guarantees all build artifacts are available before CLI jobs start.

          variables: [template: ../variables/windows.yml]

          pool: ${{ parameters.AgentPool.Medium }}
          timeoutInMinutes: 40
          cancelTimeoutInMinutes: 5

          steps:
            - template: ../templates/checkout-full.yml
              parameters:
                persistCredentials: false # We don't need git creds in this job

            - template: ../templates/prepare-js-env.yml

            - template: ../templates/prepare-build-env.yml
              parameters:
                platform: ${{ parameters.platform }}
                configuration: ${{ parameters.configuration }}
                buildEnvironment: ${{ parameters.buildEnvironment }}

            - template: ../templates/react-native-init-windows.yml
              parameters:
                template: ${{ matrix.template }}
                configuration: ${{ matrix.configuration }}
                platform: ${{ matrix.platform }}
                additionalInitArguments: ${{ matrix.additionalInitArguments }}
                additionalRunArguments: ${{ matrix.additionalRunArguments }}
                buildEnvironment: ${{ parameters.buildEnvironment }}
                useExperimentalWinUI3: ${{ coalesce(matrix.useExperimentalWinUI3, false) }}

          templateContext:
            outputs:
            - output: pipelineArtifact
              displayName: 'Upload traces'
              condition: succeededOrFailed()
              targetPath: $(Build.StagingDirectory)/Tracing
              artifactName: Traces - $(Agent.JobName)-$(System.JobAttempt)
            - output: pipelineArtifact
              displayName: 'Upload Verdaccio.log (on failure)'
              condition: failed()
              targetPath: verdaccio.log
              artifactName: $(Agent.JobName).Verdaccio.log-$(System.JobAttempt)
