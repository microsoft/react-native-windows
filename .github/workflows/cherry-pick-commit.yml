---
name: Cherry-pick Commit to Branch

'on':
  workflow_dispatch:
    inputs:
      commit_id:
        description: 'Commit SHA or ID to cherry-pick'
        required: true
        type: string
      target_branch:
        description: 'Target branch name to cherry-pick into'
        required: true
        type: string

permissions:
  contents: write
  pull-requests: write

jobs:
  cherry-pick:
    runs-on: ubuntu-latest

    steps:
      - name: Install GitHub CLI
        run: |
          sudo apt update
          sudo apt install -y gh

      - name: Authenticate GitHub CLI
        run: echo "${{ secrets.GITHUB_TOKEN }}" | gh auth login --with-token

      - name: Clone repository
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh auth setup-git
          gh repo clone "${{ github.repository }}" repo
          cd repo
          git fetch origin

      - name: Configure Git
        working-directory: ./repo
        run: |
          git config user.name "React-Native-Windows Bot"
          git config user.email "53619745+rnbot@users.noreply.github.com"

      - name: Create feature branch and cherry-pick
        working-directory: ./repo
        run: |
          COMMIT_ID="${{ github.event.inputs.commit_id }}"
          TARGET_BRANCH="${{ github.event.inputs.target_branch }}"
          SHORT_ID="${COMMIT_ID:0:9}"
          FEATURE_BRANCH="backport/cherry-pick-${SHORT_ID}-to-${TARGET_BRANCH}"

          echo "🌿 Creating feature branch $FEATURE_BRANCH from $TARGET_BRANCH"
          git checkout -b "$FEATURE_BRANCH" "origin/$TARGET_BRANCH"

          echo "🍒 Cherry-picking commit $COMMIT_ID"
          if git cherry-pick -x "$COMMIT_ID"; then
            echo "✅ Cherry-pick successful"
          else
            echo "❌ Cherry-pick failed with conflicts"
            git status
            exit 1
          fi

          echo "FEATURE_BRANCH=$FEATURE_BRANCH" >> "$GITHUB_ENV"
          echo "SHORT_ID=$SHORT_ID" >> "$GITHUB_ENV"

      - name: Push feature branch
        working-directory: ./repo
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          FEATURE_BRANCH="${{ env.FEATURE_BRANCH }}"
          REPO_URL="https://x-access-token:${GH_TOKEN}@github.com"
          REPO_URL="${REPO_URL}/${{ github.repository }}.git"
          echo "📤 Pushing feature branch $FEATURE_BRANCH"
          git push "$REPO_URL" "$FEATURE_BRANCH"
          echo "✅ Feature branch pushed"

      - name: Create Pull Request
        working-directory: ./repo
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          COMMIT_ID="${{ github.event.inputs.commit_id }}"
          TARGET_BRANCH="${{ github.event.inputs.target_branch }}"
          FEATURE_BRANCH="${{ env.FEATURE_BRANCH }}"
          SHORT_ID="${{ env.SHORT_ID }}"

          COMMIT_MSG=$(git log --format="%s" -1 "$COMMIT_ID" 2>/dev/null || echo "Cherry-pick $SHORT_ID")

          gh pr create \
            --repo "${{ github.repository }}" \
            --base "$TARGET_BRANCH" \
            --head "$FEATURE_BRANCH" \
            --title "[${TARGET_BRANCH}] Cherry-pick: $COMMIT_MSG" \
            --body "Cherry-pick of commit \`$COMMIT_ID\` to \`$TARGET_BRANCH\`.

**Original commit:** https://github.com/${{ github.repository }}/commit/$COMMIT_ID

**Cherry-picked by:** GitHub Actions workflow (\`cherry-pick-commit.yml\`)

---
$COMMIT_MSG"

          echo "✅ Pull request created targeting $TARGET_BRANCH"
