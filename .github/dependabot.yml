version: 2
updates:
# main branch - all dependency updates (minor + patch), daily
- package-ecosystem: npm
  directory: "/"
  target-branch: "main"
  groups:
    all-dependencies:
      patterns:
        - '*'
      update-types:
        - 'minor'
        - 'patch'
  schedule:
    interval: daily
    time: "05:00"
    timezone: "America/Los_Angeles"
  labels:
  - dependencies
  versioning-strategy: lockfile-only
  commit-message:
    prefix: 📦
  open-pull-requests-limit: 5

# Stable branches - weekly cadence, 1 grouped PR at a time

# 0.74 branch
- package-ecosystem: npm
  directory: "/"
  target-branch: "0.74-stable"
  groups:
    all-dependencies:
      patterns:
        - '*'
      update-types:
        - 'minor'
        - 'patch'
  ignore:
    # Pin react + react-native + react-test-renderer + @types/react* to the React 18.2 minor used by this branch.
    # Bumping to 18.3 breaks TS compilation against the React 18.2 runtime.
    - dependency-name: "react"
      update-types:
        - "version-update:semver-minor"
        - "version-update:semver-major"
    - dependency-name: "react-native"
      update-types:
        - "version-update:semver-minor"
        - "version-update:semver-major"
    - dependency-name: "react-test-renderer"
      update-types:
        - "version-update:semver-minor"
        - "version-update:semver-major"
    - dependency-name: "@types/react"
      update-types:
        - "version-update:semver-minor"
        - "version-update:semver-major"
    - dependency-name: "@types/react-dom"
      update-types:
        - "version-update:semver-minor"
        - "version-update:semver-major"
  schedule:
    interval: weekly
    time: "05:00"
    timezone: "America/Los_Angeles"
  labels:
  - dependencies
  versioning-strategy: lockfile-only
  commit-message:
    prefix: "📦 [0.74]"
  open-pull-requests-limit: 1

